# CI/CD Pipeline for myresumeapp
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  - Docker Hub username only (e.g. cesarrare), not email
#   DOCKERHUB_TOKEN     - Docker Hub access token (Account Settings → Security)
#                         Paste without quotes or trailing spaces/newlines
#   GOOGLE_CLIENT_ID    - Google OAuth Web client ID (injected as VITE_GOOGLE_CLIENT_ID)
#
# Triggers:
#   - Pull Request → main: build only (no Docker publish)
#   - Push → main:       build + Docker publish

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  #pull_request:
  #  branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  IMAGE_NAME: myresumeapp

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile production build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          if [ -z "$VITE_GOOGLE_CLIENT_ID" ]; then
            echo "GOOGLE_CLIENT_ID secret is missing."
            echo "Configure repository secret: GOOGLE_CLIENT_ID"
            exit 1
          fi
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: myresumeapp-dist
          path: dist
          retention-days: 7

  docker:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          USERNAME="$(printf '%s' "$DOCKERHUB_USERNAME" | tr -d '[:space:]')"
          TOKEN="$(printf '%s' "$DOCKERHUB_TOKEN" | tr -d '[:space:]')"

          if [ -z "$USERNAME" ] || [ -z "$TOKEN" ]; then
            echo "Docker Hub credentials are missing."
            echo "Configure repository secrets: DOCKERHUB_USERNAME and DOCKERHUB_TOKEN"
            exit 1
          fi

          printf '%s' "$TOKEN" | docker login -u "$USERNAME" --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
